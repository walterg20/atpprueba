<label class="block">
  <span class="text-sm font-medium text-slate-700">{{ label }}</span>
  <input
    class="mt-1 w-full rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm text-slate-900 shadow-sm placeholder:text-slate-400 focus:border-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-200"
    [type]="type"
    [value]="value"
    [placeholder]="placeholder"
    [readOnly]="readonly"
  />
  @if (hint) {
    <span class="mt-1 block text-xs text-slate-500">{{ hint }}</span>
  }
</label>
